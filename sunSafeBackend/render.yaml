services:
  - type: web
    name: sunsafe-api
    runtime: python
    repo: https://github.com/rahulyer002/SunSafe.git
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sunsafe-db
          property: connectionString

databases:
  - name: sunsafe-db
    plan: free